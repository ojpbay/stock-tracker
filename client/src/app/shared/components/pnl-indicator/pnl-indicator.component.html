
    <span class="pnl-wrapper" [class]="cssClass()">
      <mat-icon class="pnl-icon">{{ icon() }}</mat-icon>
      <span class="pnl-value">{{ formattedValue() }}</span>
      @if (showPercent() && pnlPercent() !== null) {
        <span class="pnl-percent">({{ pnlPercent() | number:'1.2-2' }}%)</span>
      }
    </span>
