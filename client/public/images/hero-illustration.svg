<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" fill="none" role="img" aria-hidden="true">
  <defs>
    <!-- Area fill under chart line -->
    <linearGradient id="h-area" x1="0" y1="0" x2="0" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Chart line: dims on left, full brightness on right -->
    <linearGradient id="h-line" x1="30" y1="0" x2="490" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="1"/>
    </linearGradient>

    <!-- Rocket exhaust flame -->
    <linearGradient id="h-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFD060"/>
      <stop offset="55%"  stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle radial glow behind rocket -->
    <radialGradient id="h-glow" cx="455" cy="72" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow halo around rocket area -->
  <ellipse cx="455" cy="72" rx="105" ry="80" fill="url(#h-glow)"/>

  <!-- ── Grid lines ───────────────────────────────────────────────── -->
  <g stroke="rgba(255,255,255,0.045)" stroke-width="1">
    <line x1="0"   y1="72"  x2="520" y2="72"/>
    <line x1="0"   y1="124" x2="520" y2="124"/>
    <line x1="0"   y1="176" x2="520" y2="176"/>
    <line x1="0"   y1="228" x2="520" y2="228"/>
    <line x1="80"  y1="20"  x2="80"  y2="275"/>
    <line x1="160" y1="20"  x2="160" y2="275"/>
    <line x1="240" y1="20"  x2="240" y2="275"/>
    <line x1="320" y1="20"  x2="320" y2="275"/>
    <line x1="400" y1="20"  x2="400" y2="275"/>
    <line x1="480" y1="20"  x2="480" y2="275"/>
  </g>

  <!-- ── Candlestick bars ─────────────────────────────────────────── -->
  <!-- Bar 1 – red (down) at x=100 -->
  <line x1="100" y1="198" x2="100" y2="244" stroke="#F05252" stroke-width="1.5" opacity="0.65"/>
  <rect x="91"  y="205" width="18" height="28" rx="3" fill="#F05252" fill-opacity="0.82"/>

  <!-- Bar 2 – gold (up) at x=185 -->
  <line x1="185" y1="172" x2="185" y2="218" stroke="#FFB700" stroke-width="1.5" opacity="0.65"/>
  <rect x="176" y="178" width="18" height="30" rx="3" fill="#FFB700" fill-opacity="0.82"/>

  <!-- Bar 3 – gold (up) at x=268 -->
  <line x1="268" y1="143" x2="268" y2="194" stroke="#FFB700" stroke-width="1.5" opacity="0.65"/>
  <rect x="259" y="150" width="18" height="32" rx="3" fill="#FFB700" fill-opacity="0.82"/>

  <!-- Bar 4 – red (down) at x=352 -->
  <line x1="352" y1="130" x2="352" y2="178" stroke="#F05252" stroke-width="1.5" opacity="0.65"/>
  <rect x="343" y="138" width="18" height="26" rx="3" fill="#F05252" fill-opacity="0.82"/>

  <!-- Bar 5 – gold (up) at x=432 -->
  <line x1="432" y1="98"  x2="432" y2="150" stroke="#FFB700" stroke-width="1.5" opacity="0.55"/>
  <rect x="423" y="105"  width="18" height="34" rx="3" fill="#FFB700" fill-opacity="0.70"/>

  <!-- ── Chart area fill ──────────────────────────────────────────── -->
  <path d="M 30,240 C 90,224 140,208 200,186
           C 255,167 305,148 360,124
           C 405,107 445,84 490,62
           L 490,275 L 30,275 Z"
        fill="url(#h-area)"/>

  <!-- ── Chart trend line ─────────────────────────────────────────── -->
  <path d="M 30,240 C 90,224 140,208 200,186
           C 255,167 305,148 360,124
           C 405,107 445,84 490,62"
        stroke="url(#h-line)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Data-point dots on line -->
  <circle cx="200" cy="186" r="5"   fill="#00D4FF" stroke="#0A0E1A" stroke-width="2.5"/>
  <circle cx="360" cy="124" r="5"   fill="#00D4FF" stroke="#0A0E1A" stroke-width="2.5"/>

  <!-- ── ROCKET ─────────────────────────────────────────────────────
       Centered in SVG-space at (462, 68), rotated -42° so it points
       upper-right, following the chart trend.                        -->
  <g transform="translate(462, 68) rotate(-42)">

    <!-- Exhaust flame (rendered first so body sits on top) -->
    <path d="M -7,26 C -4,38 0,56 0,58 C 0,56 4,38 7,26 Z"
          fill="url(#h-flame)"/>
    <!-- Exhaust particle puffs -->
    <circle cx="-5" cy="44" r="3"   fill="#FF8C00" fill-opacity="0.35"/>
    <circle cx=" 6" cy="47" r="2.5" fill="#FFD060" fill-opacity="0.30"/>
    <circle cx=" 0" cy="52" r="2"   fill="#FF6B00" fill-opacity="0.25"/>

    <!-- Body -->
    <rect x="-12" y="-22" width="24" height="50" rx="12"
          fill="#EDF2F7"/>
    <rect x="-12" y="-22" width="24" height="50" rx="12"
          fill="none" stroke="#C0D4E0" stroke-width="1"/>

    <!-- Nose cone -->
    <path d="M -12,-22 C -12,-43 12,-43 12,-22 Z" fill="#00D4FF"/>
    <!-- Nose highlight shimmer -->
    <path d="M -7,-24 C -7,-38 -2,-42 -2,-24 Z"
          fill="rgba(255,255,255,0.30)"/>

    <!-- Porthole window -->
    <circle cx="0" cy="3"  r="9.5" fill="#0A1628"/>
    <circle cx="0" cy="3"  r="9.5" fill="none" stroke="#00D4FF" stroke-width="2"/>
    <circle cx="0" cy="3"  r="4"   fill="#00D4FF" fill-opacity="0.65"/>
    <!-- Reflection dot -->
    <circle cx="-3" cy="0" r="1.8" fill="rgba(255,255,255,0.55)"/>

    <!-- Rivets / detail accents -->
    <circle cx="-6" cy="-8" r="1.5" fill="rgba(0,212,255,0.40)"/>
    <circle cx=" 6" cy="-8" r="1.5" fill="rgba(0,212,255,0.40)"/>

    <!-- Left fin -->
    <path d="M -12,20 L -25,38 L -12,32 Z" fill="#FFB700"/>
    <!-- Right fin -->
    <path d="M  12,20 L  25,38 L  12,32 Z" fill="#FFB700"/>
  </g>

  <!-- ── Ticker badge: AAPL ──────────────────────────────────────── -->
  <g transform="translate(52, 100)">
    <rect width="96" height="38" rx="9"
          fill="#101827" stroke="rgba(255,183,0,0.40)" stroke-width="1.5"/>
    <text x="12" y="15"
          font-family="'SF Mono','Cascadia Code','Courier New',monospace"
          font-size="10.5" font-weight="700"
          fill="#FFB700" letter-spacing="0.07em">AAPL</text>
    <text x="12" y="28"
          font-family="system-ui,-apple-system,sans-serif"
          font-size="9" font-weight="500"
          fill="rgba(255,183,0,0.72)">+2.41%</text>
    <!-- Up-arrow icon -->
    <path d="M 69,22 L 73,15 L 77,22"
          stroke="#FFB700" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>
    <line x1="73" y1="15" x2="73" y2="27"
          stroke="#FFB700" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ── Ticker badge: NVDA ──────────────────────────────────────── -->
  <g transform="translate(298, 36)">
    <rect width="98" height="38" rx="9"
          fill="#101827" stroke="rgba(0,212,255,0.40)" stroke-width="1.5"/>
    <text x="12" y="15"
          font-family="'SF Mono','Cascadia Code','Courier New',monospace"
          font-size="10.5" font-weight="700"
          fill="#00D4FF" letter-spacing="0.07em">NVDA</text>
    <text x="12" y="28"
          font-family="system-ui,-apple-system,sans-serif"
          font-size="9" font-weight="500"
          fill="rgba(0,212,255,0.72)">+5.87%</text>
    <!-- Up-arrow icon -->
    <path d="M 71,22 L 75,15 L 79,22"
          stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>
    <line x1="75" y1="15" x2="75" y2="27"
          stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ── Sparkle crosses ─────────────────────────────────────────── -->
  <!-- Gold sparkle -->
  <g stroke="#FFB700" stroke-width="2" stroke-linecap="round" opacity="0.80">
    <line x1="242" y1="88" x2="242" y2="102"/>
    <line x1="235" y1="95" x2="249" y2="95"/>
  </g>
  <circle cx="242" cy="95" r="2.5" fill="#FFB700" opacity="0.80"/>

  <!-- Cyan sparkle -->
  <g stroke="#00D4FF" stroke-width="1.5" stroke-linecap="round" opacity="0.60">
    <line x1="50" y1="145" x2="50" y2="157"/>
    <line x1="44" y1="151" x2="56" y2="151"/>
  </g>

  <!-- Small gold sparkle (lower right) -->
  <g stroke="#FFB700" stroke-width="1.5" stroke-linecap="round" opacity="0.45">
    <line x1="495" y1="160" x2="495" y2="170"/>
    <line x1="490" y1="165" x2="500" y2="165"/>
  </g>

  <!-- ── Ambient floating dots (market-data feel) ────────────────── -->
  <circle cx="140" cy="82"  r="3"   fill="#FFB700"  fill-opacity="0.35"/>
  <circle cx="150" cy="94"  r="2"   fill="#FFB700"  fill-opacity="0.20"/>
  <circle cx="132" cy="91"  r="2"   fill="#00D4FF"  fill-opacity="0.28"/>
  <circle cx="490" cy="175" r="2.5" fill="#FFB700"  fill-opacity="0.28"/>
  <circle cx="502" cy="188" r="1.5" fill="#00D4FF"  fill-opacity="0.22"/>
</svg>
